# Production Register
#
# Declares which source files are eligible for promotion to the production triplestore.
# This file is hand-edited. Adding an entry here does NOT immediately push anything to
# production — it only makes the file eligible for future promotion via the
# "Promote to Production" GitHub Actions workflow.
#
# Format:
#   files:
#     - path: <glob pattern relative to repo root>       # required
#       auto: true                                        # optional, default false
#
# The `auto` flag marks files managed by automated processes (e.g. the document register).
# These are promoted automatically by the nightly scheduled workflow without human
# intervention. All other entries require an explicit manual workflow run.
#
# The companion file `production-tracker.json` is auto-generated and records the state
# of each file at the time of its last successful promotion. Do not edit it by hand.
#
# Example:
#
# files:
#   - path: definitions/conceptschemes/*.ttl
#   - path: specification-elements/defs/*.ttl
#   - path: definitions/docs/docs.ttl
#     auto: true

files:
  - path: definitions/docs/docs.ttl
    auto: true